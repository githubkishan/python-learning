name: Run Python Lessons

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  run-lessons:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install numpy

      - name: Run 01_basics/variables.py
        run: |
          echo '## `01_basics/variables.py`' >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          python 01_basics/variables.py | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Run 01_basics/strings.py
        run: |
          echo '## `01_basics/strings.py`' >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          python 01_basics/strings.py | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Run 01_basics/lists.py
        run: |
          echo '## `01_basics/lists.py`' >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          python 01_basics/lists.py | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Run 02_loops_functions/loops.py
        run: |
          echo '## `02_loops_functions/loops.py`' >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          python 02_loops_functions/loops.py | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Run 02_loops_functions/functions.py
        run: |
          echo '## `02_loops_functions/functions.py`' >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          python 02_loops_functions/functions.py | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Run 03_numpy/numpy_basics.py
        run: |
          echo '## `03_numpy/numpy_basics.py`' >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          python 03_numpy/numpy_basics.py | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
